security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: bcrypt

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        login:
            pattern: ^/api/auth/login$
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
            custom_authenticators:
                - App\Security\ApiKeyAuthenticator
                - App\Security\WidgetSessionAuthenticator

    access_control:
        - { path: ^/api/doc$, roles: PUBLIC_ACCESS }
        - { path: ^/api/doc\.json$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        # Session publique pour page de réservation standalone (aucune auth requise)
        - { path: ^/api/public/events/.*/session, roles: PUBLIC_ACCESS }
        # SSE stream — token validé manuellement dans le contrôleur (EventSource ne supporte pas les headers)
        - { path: ^/api/widget/events/.*/stream, roles: PUBLIC_ACCESS }
        # Widget booking — auth via "Authorization: Widget <sessionToken>"
        - { path: ^/api/widget, roles: ROLE_WIDGET }
        # Sessions publiques — auth via clé secrète API (scope PUBLIC)
        - { path: ^/api/public/sessions, roles: ROLE_PUBLIC }
        - { path: ^/api/api-keys, roles: ROLE_BACKOFFICE }
        - { path: ^/api/categories, methods: [POST, PUT, DELETE], roles: ROLE_BACKOFFICE }
        - { path: ^/api/categories, roles: IS_AUTHENTICATED }
        - { path: ^/api/charts, methods: [POST, PUT, DELETE], roles: ROLE_BACKOFFICE }
        - { path: ^/api/charts, roles: IS_AUTHENTICATED }
        - { path: ^/api/events/.*/hold, roles: IS_AUTHENTICATED }
        - { path: ^/api/events/.*/book, roles: IS_AUTHENTICATED }
        - { path: ^/api/events/.*/release, roles: IS_AUTHENTICATED }
        - { path: ^/api/events/.*/change-status, roles: ROLE_BACKOFFICE }
        - { path: ^/api/events, methods: [POST, PUT, DELETE, PATCH], roles: ROLE_BACKOFFICE }
        - { path: ^/api/events, methods: [GET], roles: IS_AUTHENTICATED }
        - { path: ^/api/sessions, roles: IS_AUTHENTICATED }
        - { path: ^/api/auth/me, roles: IS_AUTHENTICATED }
        - { path: ^/api, roles: IS_AUTHENTICATED }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
            App\Entity\User:
                algorithm: bcrypt
                cost: 4
