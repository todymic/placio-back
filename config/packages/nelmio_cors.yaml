nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['%env(string:CORS_ALLOW_ORIGINS)%']
        allow_credentials: true
        allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
        allow_headers: ['Authorization', 'Content-Type', 'Accept', 'Origin', 'X-Requested-With']
        expose_headers: []
        max_age: 3600

    paths:
        '^/api/':
            origin_regex: true
            allow_origin: ['%env(string:CORS_ALLOW_ORIGINS)%']
            allow_credentials: true
            allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
            allow_headers: ['Authorization', 'Content-Type', 'Accept', 'Origin', 'X-Requested-With']
            expose_headers: []
            max_age: 3600

